<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caze TV - Live Streaming</title>
    <!-- Memuat library hls.js dari CDN -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* Gaya dasar untuk body */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container utama (Glassmorphism) */
        .player-wrapper {
            position: relative;
            width: 90%;
            max-width: 850px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 1s ease-out forwards;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Header / Judul */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: -webkit-linear-gradient(45deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            margin: 8px 0 0;
            font-size: 14px;
            color: #b0bec5;
        }

        /* Container Video untuk posisi relatif overlay */
        .video-container {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            background-color: #050505;
        }

        video {
            width: 100%;
            display: block;
            outline: none;
        }

        /* Overlay Tombol Play Awal */
        #play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            transition: opacity 0.4s ease;
        }

        .play-btn {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #play-overlay:hover .play-btn {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.6);
        }

        /* Ikon Segitiga Play */
        .play-btn::after {
            content: '';
            display: inline-block;
            margin-left: 5px;
            border-style: solid;
            border-width: 12px 0 12px 20px;
            border-color: transparent transparent transparent #ffffff;
        }

        .overlay-text {
            margin-top: 15px;
            font-size: 16px;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .player-wrapper { width: 95%; padding: 15px; border-radius: 16px; }
            .header h1 { font-size: 22px; }
            .play-btn { width: 60px; height: 60px; }
            .play-btn::after { border-width: 10px 0 10px 16px; }
        }
    </style>
</head>
<body>

    <div class="player-wrapper">
        <div class="header">
            <h1>Sai Foza</h1>
            <p>Live Streaming HD</p>
        </div>
        
        <div class="video-container">
            <!-- Menghilangkan atribut 'autoplay' dan 'muted' -->
            <video id="video-player" controls playsinline></video>
            
            <!-- Layar Penutup (Overlay) -->
            <div id="play-overlay">
                <div class="play-btn"></div>
                <div class="overlay-text">Ketuk untuk Memutar Live Streaming</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('video-player');
            const overlay = document.getElementById('play-overlay');
            const streamUrl = 'https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/1080p-vtt/index.m3u8';

            // Menyiapkan HLS.js terlebih dahulu agar loading lebih cepat
            if (Hls.isSupported()) {
                const hls = new Hls({ maxBufferLength: 30, enableWorker: true });
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
            }

            // Fungsi ketika area video/tombol diklik
            overlay.addEventListener('click', () => {
                // Memutar video bersuara (diizinkan karena pengguna sudah berinteraksi/mengklik)
                video.play().then(() => {
                    // Jika berhasil, sembunyikan layar penutup (overlay)
                    overlay.style.opacity = '0';
                    setTimeout(() => {
                        overlay.style.display = 'none';
                    }, 400); // Menunggu transisi opacity selesai
                }).catch(error => {
                    console.error("Gagal memutar video:", error);
                });
            });
        });
    </script>
</body>
</html>
