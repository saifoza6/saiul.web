<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Streaming</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            max-width: 850px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.8s ease-out forwards;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: -webkit-linear-gradient(45deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.3s ease;
        }

        .header p {
            margin: 5px 0 0;
            font-size: 14px;
            color: #b0bec5;
        }

        .video-container {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            background-color: #050505;
            aspect-ratio: 16 / 9;
            margin-bottom: 20px;
        }

video {
    width: 100%;
    height: 100%;
    display: block;
    outline: none;
    /* Ubah dari cover ke contain agar tidak terpotong (zoom) */
    object-fit: contain; 
    background-color: #000000;
}

        #play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            transition: opacity 0.4s ease;
        }

        #play-overlay::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        .play-btn {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #play-overlay:hover .play-btn {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.6);
        }

        .play-btn::after {
            content: '';
            display: inline-block;
            margin-left: 5px;
            border-style: solid;
            border-width: 12px 0 12px 20px;
            border-color: transparent transparent transparent #ffffff;
        }

        .overlay-text {
            margin-top: 15px;
            font-size: 16px;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* Diperbarui menjadi 4 kolom untuk layar besar */
        .channel-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        .channel-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .channel-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            border-color: #00bcd4;
        }

        .channel-card.active {
            background: linear-gradient(145deg, rgba(0, 210, 255, 0.2), rgba(58, 123, 213, 0.2));
            border-color: #00d2ff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            color: #00d2ff;
        }

        .info-box {
            margin-bottom: 20px;
            background: rgba(255, 0, 0, 0.1);
            border-left: 4px solid #ff4757;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Diperbarui menjadi 2 kolom (2x2) untuk layar HP */
        @media (max-width: 480px) {
            .player-wrapper { padding: 15px; border-radius: 16px; }
            .header h1 { font-size: 22px; }
            .play-btn { width: 60px; height: 60px; }
            .play-btn::after { border-width: 10px 0 10px 16px; }
            .channel-list { grid-template-columns: repeat(2, 1fr); } 
        }
    </style>
</head>
<body>

    <div class="player-wrapper">
        <div class="header">
            <h1 id="channel-title">Pilih Channel</h1>
            <p>Live Streaming HD</p>
        </div>
        
        <div class="info-box" id="error-info"></div>

        <div class="video-container">
            <video id="video-player" controls playsinline></video>
            
            <div id="play-overlay">
                <div class="play-btn"></div>
                <div class="overlay-text" id="overlay-status">Ketuk untuk Memutar</div>
            </div>
        </div>

        <div class="channel-list">
            <div class="channel-card" id="btn-caze" onclick="loadChannel('caze', true)">Caze TV</div>
            <div class="channel-card" id="btn-tsn1" onclick="loadChannel('tsn1', true)">TSN 1</div>
            <div class="channel-card" id="btn-foxone" onclick="loadChannel('foxone', true)">FOX ONE</div>
            
            <div class="channel-card" id="btn-itv" onclick="loadChannel('itv', true)">ITV</div>
            <div class="channel-card" id="btn-bein" onclick="loadChannel('bein', true)">BEIN</div>
            <div class="channel-card" id="btn-telemundo" onclick="loadChannel('telemundo', true)">Telemundo</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-player');
        const overlay = document.getElementById('play-overlay');
        const overlayText = document.getElementById('overlay-status');
        const errorBox = document.getElementById('error-info');
        const titleElement = document.getElementById('channel-title');
        
        let hlsInstance = null;
        let isError = false;

        const PROXY_URL = 'https://proxy.mrphreakers.workers.dev/?url='; 

        const channels = {
            caze: {
                name: "Caze TV",
                url: "https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/1080p-vtt/index.m3u8",
                poster: "", 
                useProxy: false 
            },
            tsn1: {
                name: "TSN 1",
                url: "https://inproviszon.st/tsn1-xyz-waUvqaAACr.m3u8",
                poster: "https://p16-common-sign.tiktokcdn.com/tos-alisg-avt-0068/1427316a5fb5244762a0278e632d5151~tplv-tiktokx-origin.image?dr=14575&refresh_token=de5c1364&x-expires=1783101600&x-signature=gSFHrexixjXskyKM%2F3jJfA782Os%3D&t=4d5b0474&ps=13740610&shp=f21f527a&shcp=9b759fb9&idc=my",
                useProxy: true 
            },
            foxone: {
                name: "FOX ONE",
                url: "https://inproviszon.st/fox-xyz-waUvqaAACr.m3u8",
                poster: "",
                useProxy: true 
            },
            itv: {
                name: "ITV",
                // URL dari Http Canary
                url: "https://inproviszon.st/itv-xyz-waUvqaAACr.m3u8",
                poster: "",
                useProxy: true // Wajib proxy untuk memanipulasi referer
            },
            // Tambahkan di daftar channels
bein: {
    name: "Bein",
    url: "https://inproviszon.st/bein12fr-xyz.m3u8",
    poster: "", // Bisa dikosongkan atau isi link gambar
    useProxy: true // Set true jika butuh referer, false jika tidak
},
telemundo: {
    name: "Telemundo",
    url: "https://inproviszon.st/telemundo-xyz-waUvqaAACr.m3u8",
    poster: "", // Bisa dikosongkan atau isi link gambar
    useProxy: true // Set true jika butuh referer, false jika tidak
}
        };

        function loadChannel(channelKey, autoPlay = false) {
            const channel = channels[channelKey];
            isError = false;
            
            errorBox.style.display = 'none';
            overlay.style.display = 'flex';
            overlay.style.opacity = '1';
            titleElement.innerText = channel.name;

            if (autoPlay) {
                overlayText.innerText = "Memuat Channel...";
                overlay.style.cursor = "wait";
            } else {
                overlayText.innerText = "Ketuk untuk Memutar";
                overlay.style.cursor = "pointer";
            }

            if(channel.poster) {
                overlay.style.backgroundImage = `url('${channel.poster}')`;
                video.poster = channel.poster;
            } else {
                overlay.style.backgroundImage = 'none';
                video.poster = "";
            }

            document.querySelectorAll('.channel-card').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${channelKey}`).classList.add('active');

            let finalUrl = channel.url;
            if(channel.useProxy) {
                finalUrl = PROXY_URL + encodeURIComponent(channel.url);
            }

            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }

            const attemptPlay = () => {
                video.play().then(() => {
                    overlay.style.opacity = '0';
                    setTimeout(() => {
                        overlay.style.display = 'none';
                    }, 400);
                }).catch(error => {
                    overlayText.innerText = "Ketuk untuk Memutar";
                    overlay.style.cursor = "pointer";
                });
            };

            if (Hls.isSupported()) {
                hlsInstance = new Hls({ maxBufferLength: 30, enableWorker: true });
                hlsInstance.loadSource(finalUrl);
                hlsInstance.attachMedia(video);

                hlsInstance.on(Hls.Events.MANIFEST_PARSED, function () {
                    if (autoPlay) attemptPlay();
                });

                hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        isError = true;
                        errorBox.style.display = 'block';
                        errorBox.innerHTML = `<strong>Gagal Memuat:</strong> Terjadi kesalahan jaringan pada server streaming.`;
                        overlay.style.display = 'none';
                        console.error("HLS Error:", data);
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = finalUrl;
                if (autoPlay) {
                    video.addEventListener('loadedmetadata', attemptPlay, { once: true });
                }
            }
        }

        overlay.addEventListener('click', () => {
            if(isError) return;

            overlayText.innerText = "Memuat Video...";
            overlay.style.cursor = "wait";

            video.play().then(() => {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 400);
            }).catch(error => {
                alert("Gagal memutar video. Pastikan jaringan stabil.");
                overlayText.innerText = "Ketuk untuk Memutar";
                overlay.style.cursor = "pointer";
            });
        });

        window.onload = () => {
            loadChannel('caze', false);
        };
    </script>
</body>
</html>
